<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>88星座マスタークイズ</title>
  <style>
    /* 全体のスタイル */
    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background-color: #0d1b2a;
      color: #e0e1dd;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background-color: #1b263b;
      max-width: 600px;
      width: 100%;
      margin: 20px;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.5);
      text-align: center;
    }
    h1, h2, h3 {
      color: #e0e1dd;
    }
    
    /* 画面の切り替え用 */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ボタンと選択肢のスタイル */
    button {
      background-color: #415a77;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      margin-bottom: 10px;
      transition: background-color 0.3s;
      width: 80%; /* ボタンのサイズを揃える */
      max-width: 300px;
    }
    button:hover { background-color: #778da9; }
    button.mode-btn {
      background-color: #1d3557;
      font-weight: bold;
    }
    button.mode-btn:hover { background-color: #457b9d; }

    .image-container img {
      max-width: 100%;
      height: auto;
      max-height: 300px;
      border-radius: 8px;
      margin-bottom: 20px;
      background-color: #000; /* 透過png対策 */
    }

    .options-group {
      margin-bottom: 25px;
      text-align: left;
    }
    .options-title {
      font-weight: bold;
      margin-bottom: 10px;
      border-bottom: 2px solid #415a77;
      padding-bottom: 5px;
    }
    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
    }
    
    /* ラジオボタンを押しやすいボタン風に */
    .option-label {
      display: block;
      background-color: #415a77;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .option-label input[type="radio"] {
      display: none;
    }
    .option-label:has(input[type="radio"]:checked) {
      background-color: #e0e1dd;
      color: #0d1b2a;
      font-weight: bold;
    }

    /* リザルト画面のスタイル */
    .review-list {
      text-align: left;
      list-style-type: none;
      padding: 0;
      max-height: 400px;
      overflow-y: auto;
    }
    .review-item {
      background-color: #2c3e50;
      margin-bottom: 10px;
      padding: 15px;
      border-radius: 8px;
      border-left: 5px solid #e63946;
    }
    .correct-text { color: #a8dadc; font-weight: bold; }
    .wrong-text { color: #e63946; font-weight: bold; }
  </style>
</head>
<body>

  <div class="container">
    <div id="start-screen" class="screen active">
      <h1>88星座マスタークイズ</h1>
      <p>星座の画像を見てクイズに挑戦しよう！全20問です。</p>
      <p>挑戦するモードを選んでください：</p>
      <button class="mode-btn" onclick="startQuiz('nameOnly')">星座名あてモード (4択)</button><br>
      <button class="mode-btn" onclick="startQuiz('nameAndArea')">星座名＋エリアあてモード</button>
    </div>

    <div id="quiz-screen" class="screen">
      <h2 id="question-counter">第 1 / 20 問</h2>
      <div class="image-container">
        <img id="constellation-image" src="" alt="星座の画像">
      </div>
      
      <div id="name-group" class="options-group">
        <div class="options-title">1. 星座の名前を選んでください（4択）</div>
        <div id="name-options" class="options-grid"></div>
      </div>

      <div id="area-group" class="options-group">
        <div class="options-title">2. エリアを選んでください（6択）</div>
        <div id="area-options" class="options-grid"></div>
      </div>

      <button id="next-btn" style="width: auto;" onclick="submitAnswer()">回答して次へ</button>
    </div>

    <div id="result-screen" class="screen">
      <h1>結果発表</h1>
      <h2 id="score-display"></h2>
      <p id="condition-note">※名前とエリアが両方正解で1問正解となります。</p>
      
      <div id="review-section" style="display: none;">
        <h3>間違えた問題の復習</h3>
        <ul id="review-list" class="review-list"></ul>
      </div>

      <button style="width: auto;" onclick="location.reload()">タイトルへ戻る</button>
    </div>
  </div>

  <script>
    // 星座データ
    const constellations = [
      { id: 1, name: "アンドロメダ座", area: "秋" },
      { id: 2, name: "いっかくじゅう座", area: "冬" },
      { id: 3, name: "いて座", area: "夏" },
      { id: 4, name: "いるか座", area: "夏" },
      { id: 5, name: "インディアン座", area: "南天" },
      { id: 6, name: "うお座", area: "秋" },
      { id: 7, name: "うさぎ座", area: "冬" },
      { id: 8, name: "うしかい座", area: "春" },
      { id: 9, name: "うみへび座", area: "春" },
      { id: 10, name: "エリダヌス座", area: "冬" },
      { id: 11, name: "おうし座", area: "冬" },
      { id: 12, name: "おおいぬ座", area: "冬" },
      { id: 13, name: "おおかみ座", area: "夏" },
      { id: 14, name: "おおぐま座", area: "北天" },
      { id: 15, name: "おとめ座", area: "春" },
      { id: 16, name: "おひつじ座", area: "秋" },
      { id: 17, name: "オリオン座", area: "冬" },
      { id: 18, name: "がか座", area: "南天" },
      { id: 19, name: "カシオペヤ座", area: "北天" },
      { id: 20, name: "かじき座", area: "南天" },
      { id: 21, name: "かに座", area: "春" },
      { id: 22, name: "かみのけ座", area: "春" },
      { id: 23, name: "カメレオン座", area: "南天" },
      { id: 24, name: "からす座", area: "春" },
      { id: 25, name: "かんむり座", area: "夏" },
      { id: 26, name: "きょしちょう座", area: "南天" },
      { id: 27, name: "ぎょしゃ座", area: "冬" },
      { id: 28, name: "きりん座", area: "北天" },
      { id: 29, name: "くじゃく座", area: "南天" },
      { id: 30, name: "くじら座", area: "秋" },
      { id: 31, name: "ケフェウス座", area: "北天" },
      { id: 32, name: "ケンタウルス座", area: "南天" },
      { id: 33, name: "けんびきょう座", area: "秋" },
      { id: 34, name: "こいぬ座", area: "冬" },
      { id: 35, name: "こうま座", area: "秋" },
      { id: 36, name: "こぎつね座", area: "夏" },
      { id: 37, name: "こぐま座", area: "北天" },
      { id: 38, name: "こじし座", area: "春" },
      { id: 39, name: "コップ座", area: "春" },
      { id: 40, name: "こと座", area: "夏" },
      { id: 41, name: "コンパス座", area: "南天" },
      { id: 42, name: "さいだん座", area: "南天" },
      { id: 43, name: "さそり座", area: "夏" },
      { id: 44, name: "さんかく座", area: "秋" },
      { id: 45, name: "しし座", area: "春" },
      { id: 46, name: "じょうぎ座", area: "南天" },
      { id: 47, name: "たて座", area: "夏" },
      { id: 48, name: "ちょうこくぐ座", area: "冬" },
      { id: 49, name: "ちょうこくしつ座", area: "秋" },
      { id: 50, name: "つる座", area: "秋" },
      { id: 51, name: "テーブルさん座", area: "南天" },
      { id: 52, name: "てんびん座", area: "春" },
      { id: 53, name: "とかげ座", area: "秋" },
      { id: 54, name: "とけい座", area: "南天" },
      { id: 55, name: "とびうお座", area: "南天" },
      { id: 56, name: "とも座", area: "南天" },
      { id: 57, name: "はえ座", area: "南天" },
      { id: 58, name: "はくちょう座", area: "夏" },
      { id: 59, name: "はちぶんぎ座", area: "南天" },
      { id: 60, name: "はと座", area: "冬" },
      { id: 61, name: "ふうちょう座", area: "南天" },
      { id: 62, name: "ふたご座", area: "冬" },
      { id: 63, name: "ペガスス座", area: "秋" },
      { id: 64, name: "へび座", area: "夏" },
      { id: 65, name: "へびつかい座", area: "夏" },
      { id: 66, name: "ヘルクレス座", area: "夏" },
      { id: 67, name: "ペルセウス座", area: "秋" },
      { id: 68, name: "ほ座", area: "南天" },
      { id: 69, name: "ぼうえんきょう座", area: "南天" },
      { id: 70, name: "ほうおう座", area: "南天" },
      { id: 71, name: "ポンプ座", area: "春" },
      { id: 72, name: "みずがめ座", area: "秋" },
      { id: 73, name: "みずへび座", area: "南天" },
      { id: 74, name: "みなみじゅうじ座", area: "南天" },
      { id: 75, name: "みなみのうお座", area: "秋" },
      { id: 76, name: "みなみのかんむり座", area: "夏" },
      { id: 77, name: "みなみのさんかく座", area: "南天" },
      { id: 78, name: "や座", area: "夏" },
      { id: 79, name: "やぎ座", area: "秋" },
      { id: 80, name: "やまねこ座", area: "冬" },
      { id: 81, name: "らしんばん座", area: "南天" },
      { id: 82, name: "りゅう座", area: "北天" },
      { id: 83, name: "りゅうこつ座", area: "南天" },
      { id: 84, name: "りょうけん座", area: "春" },
      { id: 85, name: "レチクル座", area: "南天" },
      { id: 86, name: "ろ座", area: "秋" },
      { id: 87, name: "ろくぶんぎ座", area: "春" },
      { id: 88, name: "わし座", area: "夏" }
    ];

    const ALL_AREAS = ["春", "夏", "秋", "冬", "北天", "南天"];
    const TOTAL_QUESTIONS = 20;

    let quizList = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let wrongAnswers = [];
    let currentMode = "nameAndArea"; // 'nameOnly' または 'nameAndArea'

    // 配列をシャッフルする関数
    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // 画面の切り替え関数
    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }

    // クイズの開始
    function startQuiz(mode) {
      currentMode = mode; // モードを保存
      quizList = shuffleArray(constellations).slice(0, TOTAL_QUESTIONS);
      currentQuestionIndex = 0;
      score = 0;
      wrongAnswers = [];

      // モードに合わせてエリア選択肢の表示/非表示を切り替え
      const areaGroup = document.getElementById('area-group');
      if (currentMode === 'nameOnly') {
        areaGroup.style.display = 'none';
      } else {
        areaGroup.style.display = 'block';
      }

      showScreen('quiz-screen');
      loadQuestion();
    }

    // 問題の読み込みと表示
    function loadQuestion() {
      const currentQ = quizList[currentQuestionIndex];
      document.getElementById('question-counter').textContent = `第 ${currentQuestionIndex + 1} / ${TOTAL_QUESTIONS} 問`;

      // 画像パスの生成
      const imageName = currentQ.name.replace(/座$/, '');
      document.getElementById('constellation-image').src = `${imageName}.png`;
      document.getElementById('constellation-image').onerror = function() {
        this.alt = `画像が見つかりません: ${imageName}.png`;
      };

      // --- 名前の4択を生成 ---
      const otherNames = constellations
        .map(c => c.name)
        .filter(name => name !== currentQ.name);
      const shuffledOthers = shuffleArray(otherNames);
      const nameChoices = shuffleArray([currentQ.name, ...shuffledOthers.slice(0, 3)]);

      const nameOptionsContainer = document.getElementById('name-options');
      nameOptionsContainer.innerHTML = '';
      nameChoices.forEach((choice) => {
        const label = document.createElement('label');
        label.className = 'option-label';
        label.innerHTML = `
          <input type="radio" name="name-choice" value="${choice}">
          ${choice}
        `;
        nameOptionsContainer.appendChild(label);
      });

      // --- エリアの6択を生成 (固定順、nameAndAreaモードの時のみ中身をセット) ---
      if (currentMode === 'nameAndArea') {
        const areaChoices = ALL_AREAS; 
        const areaOptionsContainer = document.getElementById('area-options');
        areaOptionsContainer.innerHTML = '';
        areaChoices.forEach((choice) => {
          const label = document.createElement('label');
          label.className = 'option-label';
          label.innerHTML = `
            <input type="radio" name="area-choice" value="${choice}">
            ${choice}
          `;
          areaOptionsContainer.appendChild(label);
        });
      }
    }

    // 回答ボタンを押したときの処理
    function submitAnswer() {
      const selectedName = document.querySelector('input[name="name-choice"]:checked');
      const selectedArea = document.querySelector('input[name="area-choice"]:checked');

      // モード別の必須チェック
      if (currentMode === 'nameOnly') {
        if (!selectedName) {
          alert("「名前」を選んでください。");
          return;
        }
      } else {
        if (!selectedName || !selectedArea) {
          alert("「名前」と「エリア」を両方選んでください。");
          return;
        }
      }

      const currentQ = quizList[currentQuestionIndex];
      const isNameCorrect = (selectedName.value === currentQ.name);
      // 名前だけモードならエリアは自動的にtrue扱いにする
      const isAreaCorrect = (currentMode === 'nameOnly') ? true : (selectedArea.value === currentQ.area);

      if (isNameCorrect && isAreaCorrect) {
        score++;
      } else {
        // 間違えた問題を復習用に保存
        wrongAnswers.push({
          questionNum: currentQuestionIndex + 1,
          correctName: currentQ.name,
          correctArea: currentQ.area,
          userName: selectedName ? selectedName.value : "未選択",
          userArea: selectedArea ? selectedArea.value : "未選択",
          isNameCorrect: isNameCorrect,
          isAreaCorrect: isAreaCorrect
        });
      }

      currentQuestionIndex++;
      if (currentQuestionIndex < TOTAL_QUESTIONS) {
        loadQuestion();
      } else {
        showResult();
      }
    }

    // リザルト画面の表示
    function showResult() {
      showScreen('result-screen');
      document.getElementById('score-display').textContent = `${TOTAL_QUESTIONS}問中 ${score}問 正解！`;

      // モードに合わせて結果画面の注釈を変更
      const conditionNote = document.getElementById('condition-note');
      if (currentMode === 'nameOnly') {
        conditionNote.textContent = "※星座の名前が正解で1問正解となります。";
      } else {
        conditionNote.textContent = "※名前とエリアが両方正解で1問正解となります。";
      }

      const reviewSection = document.getElementById('review-section');
      const reviewList = document.getElementById('review-list');
      reviewList.innerHTML = '';

      if (wrongAnswers.length > 0) {
        reviewSection.style.display = 'block';
        wrongAnswers.forEach(wrong => {
          const li = document.createElement('li');
          li.className = 'review-item';
          
          const nameResultText = wrong.isNameCorrect 
            ? `<span class="correct-text">〇 ${wrong.userName}</span>`
            : `<span class="wrong-text">× ${wrong.userName}</span> (正解: ${wrong.correctName})`;

          let reviewHTML = `
            <div style="margin-bottom: 5px;"><strong>第 ${wrong.questionNum} 問</strong></div>
            <div>名前: ${nameResultText}</div>
          `;

          // 名前とエリアあてモードの時だけエリアの復習も表示
          if (currentMode === 'nameAndArea') {
            const areaResultText = wrong.isAreaCorrect 
              ? `<span class="correct-text">〇 ${wrong.userArea}</span>`
              : `<span class="wrong-text">× ${wrong.userArea}</span> (正解: ${wrong.correctArea})`;
            reviewHTML += `<div>エリア: ${areaResultText}</div>`;
          }

          li.innerHTML = reviewHTML;
          reviewList.appendChild(li);
        });
      } else {
        reviewSection.style.display = 'none';
      }
    }
  </script>
</body>
</html>
