<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4択クイズゲーム</title>
    <style>
        /* 全体のデザイン調整 */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* クイズ画面のカード */
        .quiz-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        /* 選択肢ボタンのスタイリング */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            background-color: #e0e0e0;
            border: none;
            padding: 15px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .option-btn:hover {
            background-color: #d0d0d0;
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        /* 結果表示エリア */
        #result {
            font-size: 18px;
            font-weight: bold;
            height: 25px;
            margin-bottom: 20px;
        }

        /* 「次へ」ボタン */
        #next-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            display: none; /* 初期状態は非表示 */
        }

        #next-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2 id="question">問題がここに表示されます</h2>
    
    <div class="btn-container">
        <button class="option-btn" onclick="checkAnswer(0)">選択肢 1</button>
        <button class="option-btn" onclick="checkAnswer(1)">選択肢 2</button>
        <button class="option-btn" onclick="checkAnswer(2)">選択肢 3</button>
        <button class="option-btn" onclick="checkAnswer(3)">選択肢 4</button>
    </div>

    <div id="result"></div>
    <button id="next-btn" onclick="nextQuestion()">次の問題へ</button>
</div>

<script>
    // クイズのデータ（問題、選択肢、正解のインデックス）
    const quizData = [
        {
            question: "世界で一番高い山はどれ？",
            options: ["富士山", "キリマンジャロ", "エベレスト", "モンブラン"],
            answer: 2 // エベレスト（0から数えて2番目）
        },
        {
            question: "日本の現在の首都はどこ？",
            options: ["大阪", "東京", "京都", "横浜"],
            answer: 1 // 東京
        },
        {
            question: "光の三原色に含まれない色はどれ？",
            options: ["赤", "緑", "青", "黄色"],
            answer: 3 // 黄色
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;

    // クイズ画面を更新する関数
    function loadQuiz() {
        const currentQuiz = quizData[currentQuestionIndex];
        
        // 問題文を表示
        document.getElementById("question").innerText = currentQuiz.question;
        
        // 選択肢ボタンにテキストをセットし、有効化する
        const buttons = document.querySelectorAll(".option-btn");
        buttons.forEach((button, index) => {
            button.innerText = currentQuiz.options[index];
            button.style.backgroundColor = "#e0e0e0"; // 色をリセット
            button.disabled = false; // ボタンをクリック可能にする
        });

        // 結果と次へボタンを隠す
        document.getElementById("result").innerText = "";
        document.getElementById("next-btn").style.display = "none";
    }

    // 回答をチェックする関数
    function checkAnswer(selectedIndex) {
        const currentQuiz = quizData[currentQuestionIndex];
        const buttons = document.querySelectorAll(".option-btn");
        const resultDiv = document.getElementById("result");

        // 全てのボタンを無効化（連続クリック防止）
        buttons.forEach(button => button.disabled = true);

        // 正誤判定
        if (selectedIndex === currentQuiz.answer) {
            resultDiv.innerText = "⭕ 正解！";
            resultDiv.style.color = "green";
            buttons[selectedIndex].style.backgroundColor = "#a3e635"; // 正解ボタンを緑に
            score++;
        } else {
            resultDiv.innerText = "❌ 不正解...";
            resultDiv.style.color = "red";
            buttons[selectedIndex].style.backgroundColor = "#f87171"; // 間違えたボタンを赤に
            buttons[currentQuiz.answer].style.backgroundColor = "#a3e635"; // 正解のボタンを緑に明示
        }

        // 「次へ」ボタンを表示
        document.getElementById("next-btn").style.display = "inline-block";
    }

    // 次の問題に進む関数
    function nextQuestion() {
        currentQuestionIndex++;

        if (currentQuestionIndex < quizData.length) {
            loadQuiz();
        } else {
            // 全問終了時の処理
            showScore();
        }
    }

    // 最終スコアを表示する関数
    function showScore() {
        const container = document.querySelector(".quiz-container");
        container.innerHTML = `
            <h2>クイズ終了！</h2>
            <p style="font-size: 20px;">あなたのスコアは <strong>${quizData.length} 問中 ${score} 間違いなし！</strong> でした。</p>
            <button id="next-btn" style="display:inline-block;" onclick="location.reload()">もう一度挑戦する</button>
        `;
    }

    // 最初にクイズを読み込む
    loadQuiz();
</script>

</body>
</html>
